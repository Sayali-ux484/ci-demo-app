version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install flask

  build:
    commands:
      - echo "Build started..."
      - echo "Checking Python syntax..."
      - python -m py_compile app.py

  post_build:
    commands:
      - echo "Build completed successfully!"

artifacts:
  files:
    - app.py
    - templates/**
    - static/**
